name: Flutter Error-Free Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 1. फोल्डर्स को मर्ज करना और एंड्रॉइड का पूरा ढांचा री-क्रिएट करना
    - name: Merge Folders and Recreate Android Structure
      run: |
        if [ -d "lib" ]; then
          mkdir -p app
          cp -r lib app/
        fi
        
        cd app
        # यह कमांड बिना तुम्हारी gradle फाइल को नुकसान पहुंचाए बाकी का पूरा ढांचा (AndroidManifest, आदि) बना देगी
        flutter create --platforms=android .

    # 2. ब्रह्मास्त्र: री-क्रिएट होने के बाद वापस compileSdk 34 फोर्स करना
    - name: Force Android SDK 34 via local.properties
      run: |
        mkdir -p app/android
        echo "flutter.compileSdkVersion=34" >> app/android/local.properties
        echo "flutter.targetSdkVersion=34" >> app/android/local.properties

    # 3. कस्टम ऐप आइकॉन जनरेट करना (अब इसे AndroidManifest मिल जाएगी)
    - name: Generate App Icons
      run: |
        cd app
        flutter pub add dev:flutter_launcher_icons:"^0.13.1"
        
        mkdir -p assets
        if [ -f "../assets/app_icon.png" ]; then
          cp ../assets/app_icon.png assets/app_icon.png
        fi
        
        cat <<EOF > flutter_launcher_icons.yaml
        flutter_launcher_icons:
          android: "launcher_icon"
          image_path: "assets/app_icon.png"
        EOF
        
        flutter pub get
        flutter pub run flutter_launcher_icons

    # 4. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 5. फाइनल एपीके बिल्ड करना
    - name: Build Signed Release APK
      run: |
        cd app
        flutter pub get
        flutter build apk --release \
          --no-tree-shake-icons \
          --dart-define=STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
          --dart-define=KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
          --dart-define=KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

    # 6. तैयार रिलीज APK को अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
