name: Flutter Error-Free Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 1. बाहर वाले lib फोल्डर को सीधे app फोल्डर के अंदर मर्ज करना
    - name: Merge Folders Correctly
      run: |
        if [ -d "lib" ]; then
          mkdir -p app
          cp -r lib app/
        fi

    # 2. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 3. ब्रह्मांड का सबसे अचूक तरीका: सीधे कमांड से SDK 36 और पैकेज नेम फोर्स करना
    - name: Build Signed Release APK via Direct CLI Injection
      run: |
        cd app
        flutter pub get
        flutter build apk --release \
          --no-tree-shake-icons \
          --project-option="android.namespace=com.aark.success_coaching" \
          --project-option="android.applicationId=com.aark.success_coaching" \
          --project-option="android.compileSdk=36" \
          --project-option="android.targetSdk=36" \
          --dart-define=STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
          --dart-define=KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
          --dart-define=KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

    # 4. तैयार रिलीज APK को अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
