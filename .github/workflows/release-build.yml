name: Flutter Error-Free Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 1. फोल्डर्स को मर्ज करना और एंड्रॉइड का फ्रेश ढांचा तैयार करना
    # इससे AndroidManifest.xml और बाकी सारी जरूरी फाइलें तुरंत बन जाएंगी
    # और जो रूट फाइलें तुमने बनाई हैं वो भी सुरक्षित रहेंगी
    - name: Merge Folders and Recreate Android Structure
      run: |
        if [ -d "lib" ]; then
          mkdir -p app
          cp -r lib app/
        fi
        
        cd app
        flutter create --platforms=android .

    # 2. ब्रह्मास्त्र: रूट ग्रैडल में सब-प्रोजेक्ट्स के लिए SDK 36 फोर्स करना (ताकि फायरबेस एरर न दे)
    - name: Deep Force SDK 36 on All Subprojects (Firebase Fix)
      run: |
        cd app/android
        
        # अगर गिटहब ने ऐप लेवल पर .kts फाइल बनाई है तो उसे डिलीट करो ताकि क्लैश न हो
        if [ -f "app/build.gradle.kts" ]; then
          rm -f app/build.gradle.kts
        fi

        # रूट लेवल की build.gradle के नीचे सब-प्रोजेक्ट्स को ओवरराइड करने का कोड जोड़ना
        cat << 'EOF' >> build.gradle

        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdk 36
                        defaultConfig {
                            targetSdk 36
                        }
                    }
                }
            }
        }
        EOF

        # ऐप लेवल की build.gradle को फ्रेश और सही कॉन्फ़िगरेशन के साथ लिखना
        cat <<EOF > app/build.gradle
        apply plugin: 'com.android.application'
        apply plugin: 'kotlin-android'
        apply plugin: 'dev.flutter.flutter-gradle-plugin'

        android {
            namespace "com.aark.success_coaching"
            compileSdk 36

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = '17'
            }

            defaultConfig {
                applicationId "com.aark.success_coaching"
                minSdk 21
                targetSdk 36
                versionCode 1
                versionName "1.0.0"
            }

            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                    minifyEnabled false
                    shrinkResources false
                }
            }
        }

        flutter {
            source '../..'
        }
        EOF

        # local.properties को भी अप-टू-डेट कर देते हैं
        echo "flutter.compileSdkVersion=36" >> local.properties
        echo "flutter.targetSdkVersion=36" >> local.properties

    # 3. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 4. फाइनल एपीके बिल्ड करना (आइकॉन स्टेप पूरी तरह हटा दिया है)
    - name: Build Signed Release APK
      run: |
        cd app
        flutter pub get
        flutter build apk --release \
          --no-tree-shake-icons \
          --dart-define=STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
          --dart-define=KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
          --dart-define=KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

    # 5. तैयार रिलीज APK को अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
