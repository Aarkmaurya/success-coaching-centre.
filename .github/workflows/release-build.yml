name: Flutter Error-Free Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 1. फोल्डर्स को मर्ज करना और एंड्रॉइड का ढांचा तैयार करना
    - name: Merge Folders and Recreate Android Structure
      run: |
        if [ -d "lib" ]; then
          mkdir -p app
          cp -r lib app/
        fi
        
        cd app
        flutter create --platforms=android .

    # 2. ब्रह्मास्त्र: दोनों build.gradle फाइलों के क्लैश को खत्म करना और SDK 36 फोर्स करना
    - name: Clean Gradle Clash and Force SDK 36
      run: |
        cd app/android/app
        
        # अगर गिटहब ने .kts फाइल बना दी है तो उसे तुरंत डिलीट करो ताकि हमारी फाइल इग्नोर न हो
        if [ -f "build.gradle.kts" ]; then
          rm -f build.gradle.kts
        fi
        
        # अब एक नई और परफेक्ट build.gradle सीधे यहीं राइट कर देते हैं तुम्हारे पैकेज नेम के साथ
        cat <<EOF > build.gradle
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }

        android {
            namespace "com.aark.success_coaching"
            compileSdk 36

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = '17'
            }

            defaultConfig {
                applicationId "com.aark.success_coaching"
                minSdk 21
                targetSdk 36
                versionCode 1
                versionName "1.0.0"
            }

            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                    minifyEnabled false
                    shrinkResources false
                }
            }
        }

        flutter {
            source '../..'
        }
        EOF

        # local.properties में भी बैकअप के लिए 36 लिख देते हैं
        echo "flutter.compileSdkVersion=36" >> ../local.properties
        echo "flutter.targetSdkVersion=36" >> ../local.properties

    # 3. कस्टम ऐप आइकॉन जनरेट करना
    - name: Generate App Icons
      run: |
        cd app
        flutter pub add dev:flutter_launcher_icons:"^0.13.1"
        
        mkdir -p assets
        if [ -f "../assets/app_icon.png" ]; then
          cp ../assets/app_icon.png assets/app_icon.png
        fi
        
        cat <<EOF > flutter_launcher_icons.yaml
        flutter_launcher_icons:
          android: "launcher_icon"
          image_path: "assets/app_icon.png"
        EOF
        
        flutter pub get
        flutter pub run flutter_launcher_icons

    # 4. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 5. फाइनल एपीके बिल्ड करना
    - name: Build Signed Release APK
      run: |
        cd app
        flutter pub get
        flutter build apk --release \
          --no-tree-shake-icons \
          --dart-define=STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
          --dart-define=KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
          --dart-define=KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

    # 6. तैयार रिलीज APK को अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
