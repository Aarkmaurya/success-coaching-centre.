name: Flutter Error-Free Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: false

    # 1. आपके स्क्रीनशॉट के हिसाब से फाइलों को एकदम सही जगह सेट करना
    # बाहर वाले lib फोल्डर को सीधे app/ के अंदर कॉपी करना ताकि प्रोजेक्ट पूरा हो सके
    - name: Correctly Sync Direct Library Folders
      run: |
        if [ -d "lib" ]; then
          rm -rf app/lib
          cp -r lib app/
        fi

    # 2. एंड्रॉइड एम्बेडिंग और ग्रैडल फाइलों को फ्रेश मॉडर्न v2 पर ओवरराइड करना
    - name: Hard Reset Modern Gradle Configurations
      run: |
        # अगर कोई .kts फाइल है तो उसे हटाओ ताकि वो क्लैश न करे
        rm -f app/android/app/build.gradle.kts
        rm -f app/android/build.gradle.kts

        # रूट लेवल की settings.gradle को बिल्कुल नया v2 प्लगइन सिंटैक्स देना
        cat <<EOF > app/android/settings.gradle
        pluginManagement {
            def flutterSdkPath = {
                def properties = new Properties()
                def propertiesFile = new File(settingsDir, "local.properties")
                if (propertiesFile.exists()) {
                    propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
                }
                def sdkPath = properties.getProperty("flutter.sdk")
                if (sdkPath == null) {
                    sdkPath = System.getenv("FLUTTER_ROOT")
                }
                return sdkPath
            }()
            includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        plugins {
            id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
            id "com.android.application" version "8.1.0" apply false
            id "org.jetbrains.kotlin.android" version "1.8.22" apply false
        }
        include ':app'
        EOF

        # रूट लेवल की build.gradle में फायरबेस डिपेंडेंसीज के लिए SDK 36 फ़ोर्स ब्लॉक लगाना
        cat << 'EOF' > app/android/build.gradle
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.buildDir = '../build'
        subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
            project.evaluationDependsOn(':app')
        }
        subprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android {
                        compileSdk 36
                        defaultConfig {
                            targetSdk 36
                        }
                    }
                }
            }
        }
        tasks.register("clean", Delete) {
            delete rootProject.buildDir
        }
        EOF

        # ऐप लेवल (app/android/app/build.gradle) को पूरी तरह से मॉडर्न प्लगइन्स पर लॉक करना
        cat <<EOF > app/android/app/build.gradle
        plugins {
            id "com.android.application"
            id "kotlin-android"
            id "dev.flutter.flutter-gradle-plugin"
        }

        android {
            namespace "com.aark.success_coaching"
            compileSdk 36

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = '17'
            }

            defaultConfig {
                applicationId "com.aark.success_coaching"
                minSdk 21
                targetSdk 36
                versionCode 1
                versionName "1.0.0"
            }

            buildTypes {
                release {
                    signingConfig signingConfigs.debug
                    minifyEnabled false
                    shrinkResources false
                }
            }
        }
        EOF

        # local.properties को सही पाथ के साथ सेट करना
        echo "sdk.dir=/usr/local/lib/android/sdk" > app/android/local.properties
        echo "flutter.compileSdkVersion=36" >> app/android/local.properties
        echo "flutter.targetSdkVersion=36" >> app/android/local.properties

    # 3. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 4. फाइनल एपीके बिल्ड करना (सही डायरेक्टरी के अंदर जाकर)
    - name: Build Signed Release APK
      run: |
        cd app
        flutter pub get
        flutter build apk --release \
          --no-tree-shake-icons \
          --dart-define=STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
          --dart-define=KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}" \
          --dart-define=KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

    # 5. तैयार रिलीज APK को अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
