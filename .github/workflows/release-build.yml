name: Flutter Force-Repair & Signed Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 1. पुरानी फाइलों को बैकअप लेकर बिल्कुल फ्रेश एंड्रॉइड प्रोजेक्ट खड़ा करना
    - name: Force Recreate Full Flutter Project
      run: |
        # कोडिंग फाइलों का बैकअप लेना
        mkdir -p backup_lib backup_assets
        cp -r app/lib/* backup_lib/ 2>/dev/null || true
        cp -r app/assets/* backup_assets/ 2>/dev/null || true
        
        # पुराना आधा-अधूरा फोल्डर साफ करना
        rm -rf app
        
        # बिल्कुल नया और कंप्लीट फ्लटर प्रोजेक्ट बनाना (जिससे build.gradle पक्का बनेगी)
        flutter create --project-name=success_coaching_centre app
        
        # अपनी असली कोडिंग फाइल्स और लोगो को वापस सही जगह डालना
        rm -rf app/lib/*
        cp -r backup_lib/* app/lib/
        mkdir -p app/assets
        cp -r backup_assets/* app/assets/ 2>/dev/null || true

    # 2. आइकॉन के लिए अलग से कॉन्फ़िगरेशन फाइल बनाना और आइकॉन जनरेट करना
    - name: Generate App Icons
      run: |
        cd app
        flutter pub add dev:flutter_launcher_icons:"^0.13.1"
        
        cat <<EOF > flutter_launcher_icons.yaml
        flutter_launcher_icons:
          android: "launcher_icon"
          image_path: "assets/app_icon.png"
        EOF
        
        flutter pub get
        flutter pub run flutter_launcher_icons

    # 3. गिटहब के Secrets से कीस्टोर फाइल (.jks) को तैयार करना
    - name: Decode Keystore File
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/android/app/release-keystore.jks

    # 4. ग्रैडल को साइनिंग कीज़ की जानकारी देना
    - name: Configure Android Signing
      run: |
        cat <<EOF >> app/android/key.properties
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=release-keystore.jks
        EOF

    # 5. एंड्रॉइड के build.gradle में साइनिंग कॉन्फ़िगरेशन जोड़ना
    - name: Inject Signing Config into Gradle
      run: |
        TARGET_GRADLE="app/android/app/build.gradle"
        
        sed -i '/buildTypes {/i \
        signingConfigs {\n\
            release {\n\
                var keystoreProperties = new Properties()\n\
                var keystorePropertiesFile = rootProject.file("key.properties")\n\
                if (keystorePropertiesFile.exists()) {\n\
                    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n\
                }\n\
                keyAlias keystoreProperties["keyAlias"]\n\
                keyPassword keystoreProperties["keyPassword"]\n\
                storeFile rootProject.file(keystoreProperties["storeFile"])\n\
                storePassword keystoreProperties["storePassword"]\n\
            }\n\
        }\n' "$TARGET_GRADLE"
        
        sed -i '/release {/a \            signingConfig signingConfigs.release' "$TARGET_GRADLE"

    # 6. app फोल्डर के अंदर जाकर फाइनल Signed Release APK बिल्ड करना
    - name: Build Signed Release APK
      run: |
        cd app
        flutter build apk --release

    # 7. तैयार रिलीज APK को डाउनलोड के लिए अपलोड करना
    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: SUSSES-Coaching-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
