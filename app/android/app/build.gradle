plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.success_coaching_centre"
    compileSdk 34 // <-- यहाँ हमने इसे हमेशा के लिए 34 कर दिया!

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.example.success_coaching_centre"
        minSdk 21
        targetSdk 34 // <-- यहाँ भी 34 फिक्स
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug // या तुम्हारा कस्टम साइनिंग
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

