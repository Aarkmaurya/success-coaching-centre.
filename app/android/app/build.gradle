plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.aark.success_coaching" // <-- तुम्हारा पैकेज नेम यहाँ सेट हो गया
    compileSdk 34 

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.aark.success_coaching" // <-- यहाँ भी बिल्कुल सेम पैकेज नेम आ गया
        minSdk 21
        targetSdk 34 
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug 
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}
